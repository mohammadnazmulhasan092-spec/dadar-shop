<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Dadar Shop">
    <title>Login - Dadar Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;">
    <header class="header"><div class="container"><div class="header-main"><a href="../../index.html" class="logo"><div class="logo-icon">DS</div><div class="logo-text"><div>Dadar <span>Shop</span></div></div></a></div></div></header>
    <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:var(--space-8);">
        <div style="width:100%;max-width:420px;">
            <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-8);box-shadow:var(--shadow-lg);">
                <div style="text-align:center;margin-bottom:var(--space-6);"><h2 style="margin-bottom:var(--space-2);">Welcome Back</h2><p style="color:var(--gray-500);">Login to your Dadar Shop account</p></div>
                <form>
                    <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Email</label><input type="email" placeholder="Enter your email" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                    <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Password</label><input type="password" placeholder="Enter your password" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:var(--space-6);"><label style="display:flex;align-items:center;gap:var(--space-2);"><input type="checkbox"> Remember me</label><a href="forgot-password.html" style="color:var(--primary);">Forgot Password?</a></div>
                    <button type="submit" class="btn btn-primary w-full" style="margin-bottom:var(--space-4);">Login</button>
                </form>
                <div style="text-align:center;margin-top:var(--space-6);"><span style="color:var(--gray-500);">Don't have an account? </span><a href="register.html" style="color:var(--primary);font-weight:var(--font-semibold);">Register</a></div>
            </div>
        </div>
    </main>
</body>
</html>
