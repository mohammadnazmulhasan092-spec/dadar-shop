<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Checkout - Dadar Shop">
    <title>Checkout - Dadar Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="top-bar"><div class="container"><div class="top-bar-content"><div class="top-bar-left"><span>Welcome to Dadar Shop!</span></div></div></div></div>
    <header class="header"><div class="container"><div class="header-main"><a href="../../index.html" class="logo"><div class="logo-icon">DS</div><div class="logo-text"><div>Dadar <span>Shop</span></div></div></a></div></div></header>
    <main>
        <div class="container">
            <div class="breadcrumb"><a href="../../index.html">Home</a><span class="breadcrumb-separator">/</span><a href="../cart/cart.html">Cart</a><span class="breadcrumb-separator">/</span><span>Checkout</span></div>
            <div style="display:flex;justify-content:space-between;margin:var(--space-8) 0;max-width:600px;margin-left:auto;margin-right:auto;">
                <div style="text-align:center;"><div style="width:32px;height:32px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);margin:0 auto var(--space-2);">1</div><span style="font-weight:var(--font-semibold);">Shipping</span></div>
                <div style="text-align:center;"><div style="width:32px;height:32px;background:var(--gray-300);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-2);">2</div><span style="color:var(--gray-500);">Payment</span></div>
                <div style="text-align:center;"><div style="width:32px;height:32px;background:var(--gray-300);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-2);">3</div><span style="color:var(--gray-500);">Review</span></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 400px;gap:var(--space-6);max-width:1000px;margin:0 auto;">
                <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-6);">
                    <h3 style="margin-bottom:var(--space-6);padding-bottom:var(--space-4);border-bottom:1px solid var(--gray-200);">Shipping Address</h3>
                    <form>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);margin-bottom:var(--space-4);"><div><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">First Name</label><input type="text" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div><div><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Last Name</label><input type="text" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div></div>
                        <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Email</label><input type="email" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                        <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Phone</label><input type="tel" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                        <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Address</label><input type="text" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                        <div style="display:grid;grid-template-columns:2fr 1fr;gap:var(--space-4);margin-bottom:var(--space-4);"><div><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">City</label><input type="text" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div><div><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Postal Code</label><input type="text" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div></div>
                        <h4 style="margin:var(--space-6) 0 var(--space-4);">Payment Method</h4>
                        <div style="display:flex;flex-direction:column;gap:var(--space-3);"><label style="display:flex;align-items:center;padding:var(--space-4);border:2px solid var(--primary);border-radius:var(--radius-lg);background:rgba(255,107,53,0.05);"><input type="radio" name="payment" checked style="margin-right:var(--space-3);"><div><div style="font-weight:var(--font-semibold);">Cash on Delivery</div><div style="font-size:var(--text-sm);color:var(--gray-500);">Pay when you receive</div></div></label><label style="display:flex;align-items:center;padding:var(--space-4);border:2px solid var(--gray-200);border-radius:var(--radius-lg);"><input type="radio" name="payment" style="margin-right:var(--space-3);"><div><div style="font-weight:var(--font-semibold);">Card Payment</div></div></label></div>
                    </form>
                </div>
                <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-6);height:fit-content;position:sticky;top:100px;">
                    <h3 style="margin-bottom:var(--space-4);">Order Summary</h3>
                    <div style="margin-bottom:var(--space-4);padding-bottom:var(--space-4);border-bottom:1px solid var(--gray-200);"><div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-3);"><div style="width:50px;height:50px;border-radius:var(--radius-md);background:var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:var(--text-2xl);">🎧</div><div style="flex:1;"><div style="font-size:var(--text-sm);">Wireless Earbuds Pro</div><div style="font-size:var(--text-sm);color:var(--gray-500);">x1</div></div><div style="font-weight:var(--font-semibold);">$59.99</div></div></div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:var(--space-2);"><span>Subtotal</span><span>$519.96</span></div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:var(--space-2);"><span>Shipping</span><span style="color:var(--success);">Free</span></div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--gray-200);"><span style="font-weight:var(--font-bold);">Total</span><span style="font-weight:var(--font-bold);font-size:var(--text-xl);">$519.96</span></div>
                    <button class="btn btn-primary w-full">Place Order</button>
                    <a href="../cart/cart.html" style="display:block;text-align:center;margin-top:var(--space-3);color:var(--gray-500);font-size:var(--text-sm);">Back to Cart</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer"><div class="container"><div class="footer-bottom"><p class="footer-copyright">&copy; 2026 Dadar Shop.</p></div></div></footer>
</body>
</html>
