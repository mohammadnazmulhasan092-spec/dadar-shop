<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dadar Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header class="header"><div class="container"><div class="header-main"><a href="../../index.html" class="logo"><div class="logo-icon">DS</div><div class="logo-text"><div>Dadar <span>Shop</span></div></div></a></div></div></header>
    <main>
        <div class="container">
            <div class="breadcrumb"><a href="../../index.html">Home</a><span class="breadcrumb-separator">/</span><span>Contact Us</span></div>
            <div style="text-align:center;margin:var(--space-8) 0;"><h1>Contact Us</h1><p style="color:var(--gray-500);max-width:600px;margin:var(--space-4) auto 0;">Have questions? We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-8);margin-bottom:var(--space-12);">
                <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-8);box-shadow:var(--shadow);">
                    <form>
                        <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Name</label><input type="text" placeholder="Your name" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                        <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Email</label><input type="email" placeholder="your@email.com" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                        <div style="margin-bottom:var(--space-4);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Subject</label><input type="text" placeholder="How can we help?" style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);"></div>
                        <div style="margin-bottom:var(--space-6);"><label style="display:block;font-weight:var(--font-medium);margin-bottom:var(--space-2);">Message</label><textarea rows="5" placeholder="Your message..." style="width:100%;padding:var(--space-3);border:1px solid var(--gray-300);border-radius:var(--radius-md);resize:vertical;"></textarea></div>
                        <button type="submit" class="btn btn-primary w-full">Send Message</button>
                    </form>
                </div>
                <div>
                    <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-6);box-shadow:var(--shadow);margin-bottom:var(--space-4);display:flex;align-items:center;gap:var(--space-4);"><div style="width:50px;height:50px;background:var(--primary);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:var(--text-xl);">&#128222;</div><div><h4>Phone</h4><p style="color:var(--gray-500);">+880 1234-567890</p></div></div>
                    <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-6);box-shadow:var(--shadow);margin-bottom:var(--space-4);display:flex;align-items:center;gap:var(--space-4);"><div style="width:50px;height:50px;background:var(--primary);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:var(--text-xl);">&#9993;</div><div><h4>Email</h4><p style="color:var(--gray-500);">support@dadarshop.com</p></div></div>
                    <div style="background:var(--white);border-radius:var(--radius-xl);padding:var(--space-6);box-shadow:var(--shadow);display:flex;align-items:center;gap:var(--space-4);"><div style="width:50px;height:50px;background:var(--primary);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:var(--text-xl);">&#128205;</div><div><h4>Address</h4><p style="color:var(--gray-500);">123 Shopping Street, Dhaka, Bangladesh</p></div></div>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer"><div class="container"><div class="footer-bottom"><p class="footer-copyright">&copy; 2026 Dadar Shop.</p></div></div></footer>
</body>
</html>
